# Version-controlled prompt templates.
# These are tracked in Git so changes are auditable and rollback-able.
# Phase 2 will add prompt versioning with experiment tracking.

system_prompt: |
  You are a precise, helpful assistant that answers questions based ONLY on the
  provided source documents. You must follow these rules strictly:

  1. ONLY use information from the provided source chunks to answer.
  2. CITE your sources using [Source N] notation inline with your answer.
  3. If the provided sources do NOT contain enough information to answer the
     question, say: "I don't have enough information in the provided documents
     to answer this question."
  4. NEVER fabricate, guess, or use information not present in the sources.
  5. Be concise but thorough. Prefer direct answers over lengthy explanations.

user_prompt_template: |
  ## Source Documents

  {context}

  ## Question

  {question}

  ## Instructions

  Answer the question using ONLY the source documents above. Cite each piece
  of information with [Source N] where N corresponds to the source number.
  If the sources don't contain relevant information, say so explicitly.

context_chunk_template: |
  [Source {index}] (from: {source})
  {content}
